name: Brevo quota checker
description: Computes Brevo usage metrics and exposes structured outputs for downstream steps. This action is a decision engine only — it does not send notifications.
author: jsilvanus
runs:
  using: 'node16'
  main: 'dist/index.js'

inputs:
  config_path:
    description: 'Path to config file in the caller repo'
    required: false
    default: '.github/brevo-checker.json'
  brevo_api_key:
    description: 'Brevo API key (prefer storing in secrets as BREVO_NOTIFY_API_KEY)'
    required: false
  metric_json_path:
    description: 'Optional JSON path to numeric metric in account response'
    required: false
  local_metric_file:
    description: 'Local file path for testing (not for production)'
    required: false
  warning_percent:
    description: 'Usage percent to trigger warning (e.g. 70)'
    required: false
    default: 70
  critical_percent:
    description: 'Usage percent to trigger critical (e.g. 85)'
    required: false
    default: 85
  emergency_percent:
    description: 'Usage percent to trigger emergency (e.g. 95)'
    required: false
    default: 95
  state_file:
    description: 'Path to persistent alert state file (written in workspace)'
    required: false
    default: '.github/alert-state.json'

outputs:
  usagePercent:
    description: 'Computed usage percent (number)'
  remainingEmails:
    description: 'Remaining emails (number or empty)'
  remainingSMS:
    description: 'Remaining SMS (number or empty)'
  thresholdTriggered:
    description: "Triggered level: ok | warning | critical | emergency"
  previousThreshold:
    description: 'Previous persisted threshold level'
  stateChanged:
    description: 'true if persisted state changed during this run'
