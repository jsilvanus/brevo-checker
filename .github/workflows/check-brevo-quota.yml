name: Check Brevo quota

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run check
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
